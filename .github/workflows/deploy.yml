name: Deploy SEP Web Customer to GCP

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VM and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Tải môi trường Node.js (NVM)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Di chuyển vào thư mục code
            cd /var/www/sep-web-customer
            
            # Dọn dẹp thay đổi cũ và kéo code mới nhất từ GitHub
            git reset --hard
            git pull origin main
            
            # Cài đặt các gói thư viện mới (nếu có thêm trong package.json)
            npm install
            
            # Khởi động lại ứng dụng bằng PM2
            pm2 restart sep-web-dev || pm2 start npm --name "sep-web-dev" -- run dev